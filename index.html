<!DOCTYPE html>
<html>

<head>

    <title>Pet Adoption System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <style>


        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }



        body {
            background: #eef4f8;
        }



        /* PAGE */

        section {
            display: none;
            padding: 25px;
        }



        .active {
            display: block;
        }




        /* NAVBAR */


        nav {
            background: #0099e6;
            color: white;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 8px;
        }



            nav h2 {
                font-size: 24px;
            }





        button {
            background: #ff9800;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px;
        }




            button:hover {
                opacity: .8;
            }



            button:disabled {
                background: gray;
                cursor: not-allowed;
            }




        /* LOGIN BOX */



        .box {
            background: white;
            max-width: 430px;
            margin: 70px auto;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px #aaa;
        }



        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #bbb;
        }




        /* PET CARDS */


        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(260px,1fr));
            gap: 25px;
        }



        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 5px 15px #ccc;
        }



            .card img {
                width: 100%;
                height: 230px;
                object-fit: cover;
                border-radius: 15px;
                margin-bottom: 10px;
            }



        .status {
            font-weight: bold;
        }



        /* ADMIN */


        .admin-img {
            width: 180px !important;
            height: 130px !important;
            object-fit: cover;
        }




        .history-title {
            margin-top: 30px;
        }



        /* RESPONSIVE */


        @media(max-width:600px) {


            nav {
                flex-direction: column;
                text-align: center;
            }



            .box {
                width: 90%;
            }
        }
    </style>


</head>




<body>





    <!-- LOGIN -->


    <section id="login" class="active">



        <div class="box">



            <h2>🐾 Pet Adoption Login</h2>



            <input id="loginEmail"
                   placeholder="Email">



            <input id="loginPassword"
                   type="password"
                   placeholder="Password">



            <button onclick="login()">

                Login

            </button>




            <br><br>



            <p>

                New Customer?

                <a href="#" onclick="showPage('signup')">

                    Create Account

                </a>

            </p>



        </div>



    </section>









    <!-- SIGNUP -->



    <section id="signup">



        <div class="box">



            <h2>Create Account</h2>




            <input id="signupEmail"
                   placeholder="Email">





            <input id="signupPassword"
                   type="password"
                   placeholder="Password">





            <button onclick="signup()">

                Signup

            </button>




            <br><br>




            <a href="#" onclick="showPage('login')">

                Back to Login

            </a>




        </div>



    </section>









    <!-- CUSTOMER HOME -->


    <section id="home">



        <nav>



            <h2>🐾 AdoptMe</h2>




            <button onclick="logout()">

                Logout

            </button>




        </nav>





        <br>



        <h1>

            Available Pets

        </h1>



        <br>




        <div id="pets"
             class="grid">


        </div>




    </section>











    <!-- ADOPTION FORM -->



    <section id="adoption">



        <div class="box">




            <h2>

                Adoption Form

            </h2>





            <input id="name"
                   placeholder="Your Name">






            <input id="email"
                   placeholder="Email">







            <input id="phone"
                   placeholder="Phone">







            <input id="address"
                   placeholder="Address">






            <button onclick="submitAdoption()">

                Submit Request

            </button>





            <button onclick="showPage('home')">

                Cancel

            </button>




        </div>




    </section>











    <!-- ADMIN DASHBOARD -->



    <section id="admin">



        <nav>



            <h2>

                Admin Dashboard

            </h2>





            <button onclick="logout()">

                Logout

            </button>





        </nav>




        <br>




        <h2>

            ⏳ Pending Adoption Requests

        </h2>




        <br>




        <div id="pendingRequests">


        </div>






        <h2 class="history-title">

            📜 Request History

        </h2>




        <br>




        <div id="historyRequests">


        </div>




    </section>
    <!-- SUPABASE CDN -->

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>


    <script>


        /* ================= SUPABASE ================= */


        const SUPABASE_URL =
            "https://txibqxlycuorxyhzeuvn.supabase.co";


        const SUPABASE_KEY =
            "sb_publishable_O1c3xGhVOWJEn2DwRb5-lg_mUwsRvKK";



        const db = supabase.createClient(

            SUPABASE_URL,

            SUPABASE_KEY

        );



        let selectedPet = null;





        /* ================= PAGE SWITCH ================= */


        function showPage(id) {


            document.querySelectorAll("section")

                .forEach(s => {

                    s.classList.remove("active");

                });



            document

                .getElementById(id)

                .classList.add("active");


        }







        /* ================= SIGNUP ================= */



        async function signup() {



            let email =

                document.getElementById("signupEmail")

                    .value.trim();



            let password =

                document.getElementById("signupPassword")

                    .value.trim();




            if (email == "" || password == "") {

                alert("Fill all fields");

                return;

            }




            let { error } = await db

                .from("users")

                .insert([

                    {

                        email: email,

                        password: password,

                        role: "user"

                    }

                ]);




            if (error) {

                alert(error.message);

            }


            else {


                alert("Account Created Successfully");


                showPage("login");


            }



        }










        /* ================= LOGIN ================= */



        async function login() {



            let email =

                document.getElementById("loginEmail")

                    .value.trim();




            let password =

                document.getElementById("loginPassword")

                    .value.trim();





            let { data, error } = await db


                .from("users")


                .select("*")


                .ilike("email", email)


                .eq("password", password)


                .single();






            if (error || !data) {


                alert("Invalid Login");


                return;


            }






            if (data.role === "admin") {



                showPage("admin");



                loadRequests();



            }



            else {



                showPage("home");



                loadPets();



            }



        }









        function logout() {



            showPage("login");



        }











        /* ================= CUSTOMER PET LIST ================= */




        async function loadPets() {



            let { data, error } = await db

                .from("pets")

                .select("*");





            if (error) {

                alert(error.message);

                return;

            }





            let box =

                document.getElementById("pets");



            box.innerHTML = "";







            data.forEach(p => {





                let disable =

                    p.status === "Adopted"

                        ?

                        "disabled"

                        :

                        "";






                let text =

                    p.status === "Adopted"

                        ?

                        "Not Available"

                        :

                        "Adopt Now";






                box.innerHTML += `



<div class="card">




<img src="${p.image_url}">





<h2>

${p.name}

</h2>




<p>

Breed: ${p.breed}

</p>





<p>

Age: ${p.age}

</p>





<p class="status">

Status: ${p.status}

</p>





<button

${disable}

onclick="openAdoption(${p.id})">


${text}


</button>





</div>


`;




            });




        }









        function openAdoption(id) {



            selectedPet = id;



            showPage("adoption");



        }











        /* ================= ADOPTION FORM ================= */



        async function submitAdoption() {





            let { error } = await db


                .from("adoption_requests")


                .insert([



                    {



                        pet_id: selectedPet,



                        adopter_name:

                            document.getElementById("name").value,





                        email:

                            document.getElementById("email").value,





                        phone:

                            document.getElementById("phone").value,





                        address:

                            document.getElementById("address").value,





                        status: "Pending"




                    }



                ]);






            if (error) {



                alert(error.message);



            }





            else {




                alert("Adoption Request Sent");




                showPage("home");




                loadPets();




            }



        }









        /* ================= ADMIN DASHBOARD ================= */



        async function loadRequests() {






            let { data, error } = await db



                .from("adoption_requests")



                .select(`

id,

pet_id,

adopter_name,

email,

phone,

status,

pets(

name,

breed,

image_url

)

`);








            if (error) {



                alert(error.message);



                return;



            }







            let pendingBox =

                document.getElementById("pendingRequests");




            let historyBox =

                document.getElementById("historyRequests");





            pendingBox.innerHTML = "";

            historyBox.innerHTML = "";









            data.forEach(r => {






                let card = `




<div class="card">





<img

class="admin-img"

src="${r.pets.image_url}">






<h3>

Pet: ${r.pets.name}

</h3>






<p>

Breed: ${r.pets.breed}

</p>





<hr>






<h3>

Applicant: ${r.adopter_name}

</h3>





<p>

Email: ${r.email}

</p>





<p>

Phone: ${r.phone}

</p>






<h3>

Status: ${r.status}

</h3>



`;








                if (r.status === "Pending") {





                    card += `





<button onclick="approve(${r.id},${r.pet_id})">


Approve


</button>






<button onclick="reject(${r.id})">


Reject


</button>





</div>

<br>


`;






                    pendingBox.innerHTML += card;





                }







                else {






                    card += `




<p>

Decision Completed

</p>





</div>

<br>



`;






                    historyBox.innerHTML += card;






                }






            });







            if (pendingBox.innerHTML === "") {



                pendingBox.innerHTML =

                    "<p>No pending requests</p>";



            }







            if (historyBox.innerHTML === "") {



                historyBox.innerHTML =

                    "<p>No history available</p>";



            }




        }











        /* ================= APPROVE ================= */




        async function approve(requestID, petID) {






            await db

                .from("adoption_requests")

                .update({

                    status: "Approved"

                })

                .eq("id", requestID);







            await db

                .from("pets")

                .update({

                    status: "Adopted"

                })

                .eq("id", petID);







            alert("Request Approved");




            loadRequests();




        }









        /* ================= REJECT ================= */





        async function reject(id) {






            await db


                .from("adoption_requests")


                .update({


                    status: "Rejected"


                })


                .eq("id", id);








            alert("Request Rejected");





            loadRequests();





        }




    </script>


</body>


</html>
